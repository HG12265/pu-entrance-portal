services:
  db:
    image: mysql:8.0
    container_name: periyar_exam_db
    restart: unless-stopped
    command: [
      "mysqld",
      "--max-connections=300",
      "--innodb-buffer-pool-size=1G",
      "--innodb-log-file-size=256M",
      "--innodb-flush-log-at-trx-commit=1",
      "--sync-binlog=1",
      "--binlog-format=ROW",
      "--slow-query-log=1",
      "--long-query-time=1",
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci"
    ]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deployment/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: periyar_exam_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      SHOW_DOCS: "false"
      DATABASE_HOST: db
      DATABASE_PORT: 3306
      DATABASE_NAME: ${MYSQL_DATABASE}
      DATABASE_USER: ${MYSQL_USER}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      DATABASE_URL: ""
      BACKEND_CORS_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173,https://localhost:8443,https://127.0.0.1:8443"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      COUNSELLING_MODE: ${COUNSELLING_MODE}
      DISABLE_RATE_LIMIT: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app/static:/app/app/static
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/v1/exams/active\")'"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: periyar_exam_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--quiet", "--tries=1", "--spider", "https://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3

  backup:
    image: mysql:8.0
    container_name: periyar_exam_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./deployment/backup:/scripts
      - ./backups:/backups
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    entrypoint: |
      /bin/bash -c "
      echo 'Starting Backup Service Loop (Hourly)...';
      while true; do
        /bin/bash /scripts/backup.sh;
        echo 'Sleeping for 1 hour...';
        sleep 3600;
      done
      "
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f backup.sh || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:
